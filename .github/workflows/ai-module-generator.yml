name: AI Build Module Generator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"   # daily module generation

jobs:

  generate-modules:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # --------------------------------
      # Checkout repository
      # --------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --------------------------------
      # Setup Python
      # --------------------------------

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --------------------------------
      # Install dependencies
      # --------------------------------

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests || true

      # --------------------------------
      # Configure git
      # --------------------------------

      - name: Configure git
        run: |
          git config user.name "ai-autobuilder[bot]"
          git config user.email "ai-autobuilder@users.noreply.github.com"

      # --------------------------------
      # Run module generator
      # --------------------------------

      - name: Generate build modules
        run: |
          echo "Running AI module generator..."
          python tools/build/module_generator.py

      # --------------------------------
      # Detect changes
      # --------------------------------

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # --------------------------------
      # Commit modules
      # --------------------------------

      - name: Commit modules
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add tools/build/
          git commit -m "AI: generated new build modules"

      # --------------------------------
      # Push updates
      # --------------------------------

      - name: Push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git push