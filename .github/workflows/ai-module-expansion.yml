name: AI Module Expansion

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  expand:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pyyaml

      - name: Generate new modules
        run: |
          python tools/build/module_generator.py || true

      - name: Commit new modules
        run: |
          git config --global user.name "AI Module Generator"
          git config --global user.email "ai@sourceforage.local"

          git add tools/build/modules

          git commit -m "AI generated new build modules" || true
          git push