name: SourceForageAI System Test

on:
  workflow_dispatch:
  push:
    paths:
      - "tools/**"
      - ".github/workflows/test.yml"

jobs:

  test:

    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests networkx || true


      - name: Run system tests
        run: |
          echo "Running SourceForageAI system tests"
          python tools/test_system.py || true
          python tools/test_report.py || true


      - name: Show report
        run: |
          echo "---- SYSTEM TEST REPORT ----"
          cat system_test_report.json || echo "Report not generated"


      - name: Zip report
        run: |
          zip sourceforage-test-report.zip system_test_report.json


      - name: Generate release info
        run: |
          DATE=$(date "+%Y-%m-%d %H:%M:%S")

          echo "RELEASE_TITLE=$DATE" >> $GITHUB_ENV
          echo "RELEASE_TAG=SourceForageAI-System-Test" >> $GITHUB_ENV

          echo "Parsing errors..."

          ERRORS=$(python - <<EOF
import json

try:
    r=json.load(open("system_test_report.json"))
    errors=[]
    errors+=r.get("module_failures",[])
    errors+=r.get("build_module_failures",[])
    errors+=r.get("yaml_failures",[])

    if not errors:
        print("No errors detected")
    else:
        for e in errors[:20]:
            print(e)

except:
    print("Report parsing failed")
EOF
)

          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          echo "SourceForageAI System Test Report" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "Run Time: $DATE" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "Key Errors:" >> $GITHUB_ENV
          echo "$ERRORS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV


      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TITLE }}
          body: ${{ env.RELEASE_BODY }}
          files: sourceforage-test-report.zip
