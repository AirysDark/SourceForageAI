name: SourceForageAI System Test

on:
  workflow_dispatch:
  push:
    paths:
      - "tools/**"
      - ".github/workflows/test.yml"

jobs:
  test:

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests networkx || true


      - name: Run system tests
        run: |
          echo "Running SourceForageAI system tests"
          python tools/test_system.py || true
          python tools/test_report.py || true


      - name: Show report file
        run: |
          echo "---- SYSTEM TEST REPORT ----"
          cat system_test_report.json || echo "Report not generated"


      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sourceforage-test-report
          path: system_test_report.json