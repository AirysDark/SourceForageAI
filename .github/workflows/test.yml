name: SourceForageAI System Test

on:
  workflow_dispatch:
  push:
    paths:
      - "tools/**"
      - ".github/workflows/test.yml"

jobs:

  test:

    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests networkx || true


      - name: Run system tests
        run: |
          echo "Running SourceForageAI system tests"
          python tools/test_system.py || true
          python tools/test_report.py || true


      - name: Show report
        run: |
          echo "---- SYSTEM TEST REPORT ----"
          cat system_test_report.json || echo "Report not generated"


      - name: Zip report
        run: |
          zip sourceforage-test-report.zip system_test_report.json


      - name: Generate release body
        run: |
          python tools/generate_release_body.py


      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: SourceForageAI-System-Test
          name: ${{ github.run_id }}
          body_path: release_body.txt
          files: sourceforage-test-report.zip
