name: SourceForageAI System Test

on:
  workflow_dispatch:
  push:
    paths:
      - "tools/**"
      - ".github/workflows/test.yml"

jobs:

  test:

    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests networkx || true


      - name: Run system tests
        run: |
          echo "Running SourceForageAI system tests"
          python tools/test_system.py || true
          python tools/test_report.py || true


      - name: Show report
        run: |
          echo "---- SYSTEM TEST REPORT ----"
          cat system_test_report.json || echo "Report not generated"


      - name: Zip report
        run: |
          zip sourceforage-test-report.zip system_test_report.json


      - name: Generate release metadata
        run: |
          DATE=$(date "+%Y-%m-%d %H:%M:%S")
          echo "$DATE" > release_title.txt

          python << 'PY'
import json

body = ["SourceForageAI System Test Report", ""]

try:
    r=json.load(open("system_test_report.json"))

    errors=[]
    errors+=r.get("module_failures",[])
    errors+=r.get("build_module_failures",[])
    errors+=r.get("yaml_failures",[])

    body.append("Key Errors:\n")

    if errors:
        for e in errors[:20]:
            body.append(str(e))
    else:
        body.append("No errors detected")

except:
    body.append("Report parsing failed")

open("release_body.txt","w").write("\n".join(body))
PY


      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: SourceForageAI-System-Test
          name: ${{ github.run_id }}
          body_path: release_body.txt
          files: sourceforage-test-report.zip
