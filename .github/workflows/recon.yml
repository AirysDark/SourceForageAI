name: Ultra Deep Recon (SourceForageAI)

on:
  workflow_dispatch:

jobs:
  recon:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SourceForageAI
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            tree unzip file binutils coreutils \
            build-essential cmake ninja-build \
            meson bison flex wget

          python -m pip install --upgrade pip
          pip install requests || true

      - name: Run Ultra Deep Scan
        run: |
          REPORT="ultra_recon.txt"

          echo "=========================================" > $REPORT
          echo " ULTRA DEEP RECON REPORT" >> $REPORT
          echo "=========================================" >> $REPORT

          echo -e "\n=== SYSTEM INFO ===" >> $REPORT
          uname -a >> $REPORT
          python --version >> $REPORT

          echo -e "\n=== FULL FILE TREE ===" >> $REPORT
          tree -a -L 8 >> $REPORT || true

          echo -e "\n=== BUILD SYSTEM INDICATORS ===" >> $REPORT
          find . -name "Makefile" >> $REPORT || true
          find . -name "CMakeLists.txt" >> $REPORT || true
          find . -name "Cargo.toml" >> $REPORT || true
          find . -name "package.json" >> $REPORT || true
          find . -name "pyproject.toml" >> $REPORT || true

      - name: Upload Recon Report
        uses: actions/upload-artifact@v4
        with:
          name: ultra-deep-recon-report
          path: ultra_recon.txt
