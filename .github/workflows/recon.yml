name: Ultra Deep Recon (SourceForageAI)

on:
  workflow_dispatch:

jobs:
  recon:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SourceForageAI
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            tree unzip file binutils coreutils \
            build-essential cmake ninja-build \
            meson bison flex wget graphviz

          python -m pip install --upgrade pip
          pip install requests networkx || true

      - name: Run Ultra Deep Scan
        run: |
          REPORT="ultra_recon.txt"
          JSON="repo_intelligence.json"

          echo "=========================================" > $REPORT
          echo " ULTRA DEEP RECON REPORT" >> $REPORT
          echo "=========================================" >> $REPORT

          echo -e "\n=== SYSTEM INFO ===" >> $REPORT
          uname -a >> $REPORT
          python --version >> $REPORT

          echo -e "\n=== FULL FILE TREE ===" >> $REPORT
          tree -a -L 8 >> $REPORT || true

          echo -e "\n=== BUILD SYSTEM INDICATORS ===" >> $REPORT
          find . -name "Makefile" >> $REPORT || true
          find . -name "CMakeLists.txt" >> $REPORT || true
          find . -name "Cargo.toml" >> $REPORT || true
          find . -name "package.json" >> $REPORT || true
          find . -name "pyproject.toml" >> $REPORT || true
          find . -name "build.gradle" >> $REPORT || true
          find . -name "pom.xml" >> $REPORT || true

          echo -e "\n=== PYTHON FILES ===" >> $REPORT
          find . -name "*.py" >> $REPORT || true

          echo -e "\n=== PYTHON IMPORT GRAPH ===" >> $REPORT
          grep -R "import " --include="*.py" . >> $REPORT || true
          grep -R "from .* import" --include="*.py" . >> $REPORT || true

          echo -e "\n=== PYTHON CLASSES ===" >> $REPORT
          grep -R "class " --include="*.py" . >> $REPORT || true

          echo -e "\n=== PYTHON FUNCTIONS ===" >> $REPORT
          grep -R "def " --include="*.py" . >> $REPORT || true

          echo -e "\n=== PYTHON ENTRYPOINTS ===" >> $REPORT
          grep -R "__main__" --include="*.py" . >> $REPORT || true

          echo -e "\n=== SHELL SCRIPTS ===" >> $REPORT
          find . -name "*.sh" >> $REPORT || true

          echo -e "\n=== DOCKERFILES ===" >> $REPORT
          find . -name "Dockerfile" >> $REPORT || true

          echo -e "\n=== CI PIPELINES ===" >> $REPORT
          find . -path "*/.github/workflows/*.yml" >> $REPORT || true

          echo -e "\n=== REQUIREMENTS FILES ===" >> $REPORT
          find . -name "requirements.txt" >> $REPORT || true
          find . -name "poetry.lock" >> $REPORT || true

          echo -e "\n=== GENERATING MACHINE INTELLIGENCE JSON ===" >> $REPORT

          python << 'PY'
import json
from pathlib import Path

root = Path(".")
data = {
    "python_files": [],
    "imports": {},
    "entrypoints": [],
}

for f in root.rglob("*.py"):
    data["python_files"].append(str(f))

    imports = []
    for line in f.read_text(errors="ignore").splitlines():
        if line.strip().startswith("import "):
            imports.append(line.strip())
        if line.strip().startswith("from "):
            imports.append(line.strip())
        if "__main__" in line:
            data["entrypoints"].append(str(f))

    data["imports"][str(f)] = imports

Path("repo_intelligence.json").write_text(
    json.dumps(data, indent=2)
)
PY

          echo -e "\n=========================================" >> $REPORT
          echo " RECON COMPLETE" >> $REPORT
          echo "=========================================" >> $REPORT

      - name: Upload Recon Report
        uses: actions/upload-artifact@v4
        with:
          name: ultra-deep-recon-report
          path: |
            ultra_recon.txt
            repo_intelligence.json
