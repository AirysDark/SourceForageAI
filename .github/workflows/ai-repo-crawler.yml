name: AI Repository Crawler

on:
schedule:
- cron: "0 */6 * * *"
workflow_dispatch:

jobs:

discover-repos:

runs-on: ubuntu-latest

steps:

  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install dependencies
    run: pip install requests

  - name: Discover repositories
    run: |
      python tools/build/repo_crawler.py || true