name: AI Repository Crawler

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  discover-repos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SourceForageAI
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Discover repositories
        run: |
          echo "Starting SourceForageAI crawler..."
          python tools/build/repo_crawler.py || true
