name: SourceForageAI Repair Engine

on:
  workflow_dispatch:

jobs:

  repair:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip jq zip
          python -m pip install --upgrade pip
          pip install requests || true


      # ------------------------------
      # Download latest reports
      # ------------------------------

      - name: Download latest reports
        run: |

          mkdir -p reports
          cd reports

          echo "Downloading latest recon report..."

          curl -L \
          https://github.com/${{ github.repository }}/releases/latest/download/ultra-deep-recon-report.zip \
          -o recon.zip || true

          echo "Downloading latest test report..."

          curl -L \
          https://github.com/${{ github.repository }}/releases/latest/download/sourceforage-test-report.zip \
          -o test.zip || true

          unzip -o recon.zip || true
          unzip -o test.zip || true

          cd ..


      # ------------------------------
      # Run repair engine
      # ------------------------------

      - name: Run repair engine
        run: |
          echo "Running SourceForageAI repair engine..."
          python tools/repair/repair_engine.py || true


      # ------------------------------
      # Zip results
      # ------------------------------

      - name: Zip repair results
        run: |

          if [ -d repaired_files ]; then
            zip -r sourceforage-repair-results.zip repair_report.txt repaired_files
          else
            echo "No repaired files found"
            zip sourceforage-repair-results.zip repair_report.txt || true
          fi


      # ------------------------------
      # Generate release body
      # ------------------------------

      - name: Generate release body
        run: |
          python tools/generate_release_body.py \
            --workflow "Repair Engine" \
            --report repair_report.txt


      # ------------------------------
      # Generate timestamp
      # ------------------------------

      - name: Generate timestamp
        run: |
          DATE="$(date '+%Y-%m-%d %H:%M:%S')"
          TAG="$(date '+%Y%m%d-%H%M%S')"

          echo "RELEASE_TITLE=Repair Engine - $DATE" >> $GITHUB_ENV
          echo "RELEASE_TAG=Repair-Engine-$TAG" >> $GITHUB_ENV


      # ------------------------------
      # Create GitHub release
      # ------------------------------

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TITLE }}
          body_path: release_body.txt
          files: sourceforage-repair-results.zip


      # ------------------------------
      # Upload artifacts
      # ------------------------------

      - name: Upload repair artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sourceforage-repair-results
          path: |
            repair_report.txt
            repaired_files/