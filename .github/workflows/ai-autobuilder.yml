name: AI Autobuilder

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:

  build-and-fix:

    # prevent infinite loops from bot commits
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:

      # --------------------------------
      # Checkout repo
      # --------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --------------------------------
      # Python setup
      # --------------------------------

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --------------------------------
      # Ensure AI memory folder exists
      # --------------------------------

      - name: Prepare AI memory
        run: |
          mkdir -p tools/ai_memory
          if [ ! -f tools/ai_memory/db.json ]; then
            echo "{}" > tools/ai_memory/db.json
          fi

      # --------------------------------
      # Restore AI memory cache
      # --------------------------------

      - name: Restore AI memory
        uses: actions/cache@v4
        with:
          path: tools/ai_memory/db.json
          key: ai-memory-${{ github.repository }}-${{ github.ref }}
          restore-keys: |
            ai-memory-${{ github.repository }}
            ai-memory-

      # --------------------------------
      # Install system dependencies
      # --------------------------------

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            bison \
            flex \
            wget \
            unzip

          python -m pip install --upgrade pip
          pip install requests || true

      # --------------------------------
      # Configure git
      # --------------------------------

      - name: Configure git
        run: |
          git config --global user.name "ai-autobuilder[bot]"
          git config --global user.email "ai-autobuilder@users.noreply.github.com"

      # --------------------------------
      # Run AI Autobuilder
      # --------------------------------

      - name: Run AI Autobuilder
        env:
          PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
        run: |
          echo "Starting AI Autobuilder..."
          python tools/ai_autobuilder.py || true

      # --------------------------------
      # Upload logs
      # --------------------------------

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-build-logs
          path: |
            build.log
            tools/ai_memory/db.json
          if-no-files-found: ignore

      # --------------------------------
      # Detect repo changes
      # --------------------------------

      - name: Check if files changed
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # --------------------------------
      # Commit AI fixes
      # --------------------------------

      - name: Commit fixes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add .
          git commit -m "AI autobuilder: automated fix"

      # --------------------------------
      # Create Pull Request
      # --------------------------------

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: fix/ai-autobuilder-${{ github.run_id }}
          base: main
          title: "AI Autobuilder Fix"
          body: |
            Automated build repair generated by **AI Autobuilder**.

            The system attempted to fix build failures automatically.

            It may also generate build modules inside:

            tools/build/

            These modules allow the AI to learn how to build this repository automatically.

            Please review the patch before merging.